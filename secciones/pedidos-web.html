<section id="seccion-pedidos-web">
    <style>
        .kanban-column {
            min-height: 300px;
            max-height: 75vh;
            overflow-y: auto;
            padding: 0.75rem;
            background-color: #f4f6f9;
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
        }
        .pedido-card {
            transition: all 0.2s ease;
            border-left: 5px solid #6c757d;
            cursor: default;
            border-radius: 0.75rem;
        }
        .pedido-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08)!important;
        }
        .pedido-card.payment-pending { border-left-color: #e74a3b; }
        .pedido-card.payment-paid { border-left-color: #1cc88a; }
        
        .kanban-column::-webkit-scrollbar { width: 6px; }
        .kanban-column::-webkit-scrollbar-track { background: transparent; }
        .kanban-column::-webkit-scrollbar-thumb { background: #d1d3e2; border-radius: 10px; }
        .kanban-column::-webkit-scrollbar-thumb:hover { background: #858796; }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold text-gray-800"><i class="fas fa-shopping-cart text-primary me-2"></i>Logística Web (Tiendanube)</h2>
    </div>

    <div class="row kanban-board g-3">
        <!-- Columna Pendientes -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center py-3 rounded-top">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-exclamation-circle me-2"></i>Nuevos / Pendientes</h5>
                    <span class="badge bg-white text-danger rounded-pill fs-6 shadow-sm" id="count-pendientes">0</span>
                </div>
                <div class="card-body kanban-column" id="col-pendientes"></div>
            </div>
        </div>

        <!-- Columna En Preparación -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center py-3 rounded-top">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-box-open me-2"></i>En Preparación (Armando)</h5>
                    <span class="badge bg-white text-warning rounded-pill fs-6 shadow-sm" id="count-preparacion">0</span>
                </div>
                <div class="card-body kanban-column" id="col-preparacion"></div>
            </div>
        </div>

        <!-- Columna Finalizados -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3 rounded-top">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-check-double me-2"></i>Listos / Despachados</h5>
                    <span class="badge bg-white text-success rounded-pill fs-6 shadow-sm" id="count-finalizados">0</span>
                </div>
                <div class="card-body kanban-column" id="col-finalizados"></div>
            </div>
        </div>
    </div>

    <!-- INICIO DE LA MODIFICACIÓN: Tabla de Archivados -->
    <hr class="my-5 border-secondary opacity-25">
    <div class="card shadow-sm mb-4 border-0 rounded-4">
        <div class="card-header bg-secondary text-white py-3 border-0 rounded-top-4 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold"><i class="fas fa-archive me-2"></i>Historial de Pedidos Entregados</h5>
            <span class="badge bg-white text-secondary rounded-pill fs-6 shadow-sm" id="count-archivados">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Orden</th>
                            <th>Fecha</th>
                            <th>Cliente</th>
                            <th>Envío</th>
                            <th>Total</th>
                            <th>Pago</th>
                            <th class="pe-4 text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-pedidos-archivados"></tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- FIN DE LA MODIFICACIÓN -->

    <!-- Contenedor dinámico para el Modal de Detalles -->
    <div id="modal-container-pedidos"></div>
</section>
